<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Каравай Святослав Александрович</title>

  <meta property="og:title" content="Каравай Святослав Александрович">
  <meta property="og:description" content="Старший оперуполномоченный по особо важным делам ГУУР МВД Кыргызской Республики">
  <meta property="og:image" content="https://cardlink.github.io/k/photo.jpeg">
  <meta property="og:type" content="website">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Manrope', sans-serif;
      background: linear-gradient(145deg, #f3f3f3 0%, #ebebeb 45%, #f7f7f7 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: #111;
    }

    .card {
      width: 100%;
      max-width: 430px;
      position: relative;
      overflow: hidden;
      border-radius: 34px;
      padding: 34px 24px 28px;
      background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(245,245,245,0.98));
      border: 1px solid rgba(0,0,0,0.05);
      box-shadow: 0 24px 70px rgba(0,0,0,0.08);
      text-align: center;
    }

    .mvd-bg {
      position: absolute;
      top: 105px;
      left: 50%;
      transform: translateX(-50%);
      width: 285px;
      opacity: 0.05;
    }

    .photo-wrap {
      width: 156px;
      height: 156px;
      margin: 0 auto 24px;
      border-radius: 50%;
      padding: 5px;
      background: linear-gradient(145deg, #ffffff, #dddddd);
    }

    .photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    h1 {
      font-size: 36px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .role {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .main-btn {
      display: block;
      width: 100%;
      padding: 16px;
      border-radius: 20px;
      background: #111;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .actions {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .action {
      padding: 14px;
      border-radius: 16px;
      background: #eee;
      text-decoration: none;
      color: #111;
      font-weight: 600;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>

<body>
  <div class="card">

    <img src="logo.jpg" class="mvd-bg">

    <div class="photo-wrap">
      <img src="photo.jpeg" class="photo">
    </div>

    <h1>Каравай Святослав<br>Александрович</h1>

    <div class="role">
      Старший оперуполномоченный по особо важным делам ГУУР МВД Кыргызской Республики
    </div>

    <a href="./contact.vcf" class="main-btn">Сохранить контакт</a>

    <div class="actions">
      <a href="tel:+996555665653" class="action">Звонок</a>
      <a href="https://wa.me/996555665653" class="action">Сообщение</a>
    </div>

    <div class="footer">
      Быстрый доступ к контактам
    </div>

  </div>
</body>
</html>
